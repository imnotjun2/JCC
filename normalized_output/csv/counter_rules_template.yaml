# 金铲铲阵容克制规则标注模板
# 请根据游戏理解和实际对局经验补充/修改规则

# ============================================
# 1. 羁绊分类定义
# ============================================
trait_categories:
  # 格式: 羁绊名: {type: 类型, range: 距离, 特性...}
  
  刺客:
    type: 输出
    range: 近战切入
    burst: true
    fragile: true    # 自身较脆
  
  斗士:
    type: 前排
    range: 近战
    tank: true
  
  法师:
    type: 输出
    range: 远程
    aoe: true       # 多AOE技能
  
  游侠:
    type: 输出
    range: 远程
    dps: true       # 持续物理输出
  
  圣贤:
    type: 辅助
    range: 远程
    sustain: true   # 持续作战/回复
  
  护卫:
    type: 前排
    range: 近战
    tank: true
    shield: true    # 护盾
  
  神谕者:
    type: 辅助
    range: 远程
    buff: true      # 团队增益
  
  猎手:
    type: 输出
    range: 远程
    assassin: true  # 有点像刺客的远程
  
  裁决战士:
    type: 输出
    range: 近战
    true_damage: true  # 真伤
  
  迅捷射手:
    type: 输出
    range: 远程
    burst: true
  
  # TODO: 添加其他羁绊...


# ============================================
# 2. 奕子定位分类
# ============================================
unit_roles:
  # 格式: 奕子名: {role: 定位, damage_type: 伤害类型, traits: [羁绊]}
  
  蔚:
    role: 前排
    damage_type: 物理
    traits: [斗士, 皮城]
  
  俄洛伊:
    role: 前排
    damage_type: 物理
    traits: [斗士, 诺克萨斯]
  
  永恩:
    role: 输出
    damage_type: 物理
    traits: [斗士, 艾欧尼亚]
  
  霞:
    role: 输出
    damage_type: 物理
    traits: [迅捷射手, 艾欧尼亚]
  
  凯尔:
    role: 输出
    damage_type: 物理
    traits: [圣贤, 艾欧尼亚]
  
  # TODO: 从你的 unit_rankings.csv 提取所有奕子并标注


# ============================================
# 3. 伤害类型分类
# ============================================
damage_types:
  physical:
    - 依靠攻击力
    - 依靠攻击速度
    - 技能包含物理伤害
  
  magic:
    - 技能魔法伤害
    - 法术强度加成
  
  true_damage:
    - 百分比伤害
    - 真实伤害
  
  hybrid:
    - 物理+魔法混合


# ============================================
# 4. 羁绊克制关系矩阵
# ============================================
# 正数表示克制，负数表示被克制，0表示无明显关系
trait_counters:
  # 格式: 克制方: {被克制方: 克制权重}
  
  刺客:
    法师: 0.3      # 切入击杀脆皮法师
    游侠: 0.25     # 克制依赖平A的游侠
    辅助: 0.2      # 击杀保护/治疗
  
  法师:
    斗士: 0.25     # AOE克制聚堆
    护卫: 0.2      # 魔法伤害克制
  
  斗士:
    刺客: 0.3      # 前排坦度阻止刺客
    射手: 0.15     # 近战克制远程
  
  游侠:
    斗士: 0.2      # 远程克制短手
    坦克: 0.15
  
  圣贤:
    法师: 0.2      # 持续回复克制法师爆发
    刺客: 0.15     # 续航克制刺客
  
  # TODO: 根据你的理解补充更多...


# ============================================
# 5. 装备克制规则
# ============================================
item_counters:
  # 格式: 装备效果: {克制: [被克制特征], 权重}
  
  巨人杀手:
   克制: [高血量, 坦克]
   权重: 0.25
  
  法穿/穿甲:
   克制: [高护甲, 高魔抗]
   权重: 0.2
  
  鬼索的狂暴之刃:
   克制: [高攻速阵容]
   权重: 0.15
  
  夜之锋刃:
   克制: [刺客]
   权重: 0.2
  
  水银:
   克制: [多控制]
   权重: 0.15
  
  饮血剑:
   克制: [爆发]
   权重: 0.1


# ============================================
# 6. 特征权重配置
# ============================================
feature_weights:
  trait_counter: 0.35     # 羁绊克制
  damage_type: 0.20        # 伤害类型
  frontline: 0.15         # 前排质量
  control: 0.15            # 控制能力
  burst_vs_sustain: 0.10   # 爆发vs持续
  equipment: 0.05          # 装备克制


# ============================================
# 7. 人工验证数据（用于校准规则）
# ============================================
# 记录你实际对局中发现的克制关系，用于验证和调整规则
manual_validation:
  - 阵容A: 德玛西亚
    阵容B: 诺克萨斯
    结果: A克B / B克A / 均势
    原因: （你的分析）
  
  - 阵容A: 
    阵容B: 
    结果: 
    原因: 
  
  # TODO: 补充更多实际对局记录


# ============================================
# 使用说明
# ============================================
"""
1. 先完善 trait_categories - 标注所有羁绊的特性
2. 再完善 unit_roles - 从 unit_rankings.csv 提取奕子并分类
3. 补充 trait_counters - 根据理解标注羁绊克制关系
4. 记录 manual_validation - 用实际对局来验证规则
5. 调整 feature_weights - 根据验证结果微调权重
"""
