  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">JCCgaoshou</p>
        <h1>金铲铲高手</h1>
        <p class="hero-text">围绕阵容认知、单对单对阵、单局分析和环境矩阵联动的金铲铲博弈工作台。</p>
        <div class="hero-pills" id="prdFocus"></div>
      </div>
      <div class="hero-panel">
        <p class="panel-kicker">Guide</p>
        <h2>使用说明</h2>
        <div class="meta-note" id="metaNote"></div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar panel">
        <div class="panel-head compact-head">
          <div>
            <p class="panel-kicker">Comps</p>
            <h2>核心阵容池</h2>
          </div>
        </div>
        <div class="comp-list" id="compList"></div>
      </aside>

      <section class="main-stage">
        <section class="panel profile-panel" id="profilePanel"></section>

        <section class="panel workbench-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Workbench</p>
              <h2>阵容博弈工作区</h2>
            </div>
            <div class="tab-switcher">
              <button type="button" class="tab-btn" id="tabPairwise">
                <span>阵容对阵</span>
                <small>单对单阶段关系</small>
              </button>
              <button type="button" class="tab-btn" id="tabBattle">
                <span>对局分析</span>
                <small>8 家环境判断</small>
              </button>
            </div>
          </div>
          <div id="tabContent"></div>
        </section>

        <section class="panel matrix-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Matrix</p>
              <h2>环境矩阵</h2>
            </div>
            <span class="tiny-chip">点击单元格可跳转阵容对阵</span>
          </div>
          <div class="matrix-legend">
            <span class="legend-item"><i class="legend-dot is-win"></i>优势</span>
            <span class="legend-item"><i class="legend-dot is-even"></i>均势</span>
            <span class="legend-item"><i class="legend-dot is-lose"></i>劣势</span>
            <span class="legend-item"><i class="legend-dot is-conditional"></i>条件互克</span>
          </div>
          <div class="matrix-wrap" id="matrixWrap"></div>
        </section>
        <section class="panel intel-panel is-compact">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">JCCBot</p>
              <h2>开发中</h2>
            </div>
            <span class="tiny-chip">今日上分日报</span>
          </div>
          <div id="intelIntro"></div>
          <div class="intel-feed" id="intelFeed"></div>
        </section>
      </section>
    </main>
  </div>
